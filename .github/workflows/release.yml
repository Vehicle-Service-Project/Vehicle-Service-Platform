name: Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: stage
        type: choice
        options:
          - stage
          - prod
      ref:
        description: "Git ref to package"
        required: true
        default: main
        type: string
      release_version:
        description: "Optional version label (example: 0.1.0)"
        required: false
        type: string
      create_draft_release:
        description: "Create a draft GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare Release Artifact
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare release metadata
        id: metadata
        shell: bash
        run: |
          VERSION="${{ inputs.release_version }}"

          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_SHA::7}"
          fi

          ARTIFACT_NAME="vehicle-service-platform-${{ inputs.environment }}-${VERSION}"

          {
            echo "artifact_name=$ARTIFACT_NAME"
            echo "release_version=$VERSION"
          } >> "$GITHUB_OUTPUT"

          cat <<EOF > release-metadata.json
          {
            "environment": "${{ inputs.environment }}",
            "ref": "${{ inputs.ref }}",
            "sha": "${{ github.sha }}",
            "releaseVersion": "$VERSION",
            "workflow": "${{ github.workflow }}",
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}"
          }
          EOF

      - name: Create source archive
        shell: bash
        run: |
          git archive \
            --format=tar.gz \
            --output "${{ steps.metadata.outputs.artifact_name }}.tar.gz" \
            "${GITHUB_SHA}"

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            ${{ steps.metadata.outputs.artifact_name }}.tar.gz
            release-metadata.json
          if-no-files-found: error

      - name: Create draft GitHub Release
        if: ${{ inputs.create_draft_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release/${{ inputs.environment }}/${{ steps.metadata.outputs.release_version }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.metadata.outputs.release_version }} (${{ inputs.environment }})
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.metadata.outputs.artifact_name }}.tar.gz
            release-metadata.json
