name: CI

on:
  push:
    branches: [main, master, stage, prod]
  pull_request:

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}-

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Configure Turbo affected range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "TURBO_SCM_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "TURBO_SCM_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "TURBO_SCM_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "TURBO_SCM_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - run: npm run lint:ci -- --affected

  ci-success:
    name: CI
    runs-on: ubuntu-latest
    needs: eslint
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ needs.eslint.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed"
